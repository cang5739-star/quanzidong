name: 编译马桶Ai越狱插件

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装Theos
        run: |
          sudo mkdir -p /opt/theos
          sudo chown $(whoami) /opt/theos
          git clone --recursive --depth=1 https://github.com/theos/theos.git /opt/theos 2>&1 | tail -5
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: 安装ldid签名工具
        run: |
          # ldid用于签名dylib，Theos依赖
          curl -L -o /tmp/ldid https://github.com/ProcursusTeam/ldid/releases/download/v2.1.5-procursus7/ldid_macosx_arm64
          chmod +x /tmp/ldid
          sudo cp /tmp/ldid /usr/local/bin/ldid
          which ldid && ldid -v

      - name: 编译
        run: |
          export THEOS=/opt/theos
          export THEOS_DEVICE_IP=localhost

          # 一步一步来，看看哪里报错
          echo "=== 步骤1: 环境检查 ==="
          which make && make --version | head -1
          echo "Xcode: $(xcodebuild -version 2>&1 | head -1)"
          echo "SDK: $(xcrun --sdk iphoneos --show-sdk-path 2>&1)"
          echo ""
          echo "=== 步骤2: 检查Theos ==="
          ls /opt/theos/makefiles/common.mk
          echo ""
          echo "=== 步骤3: 编译Tweak ==="
          make clean 2>&1
          make 2>&1
          echo ""
          echo "=== 步骤4: make package ==="
          make package 2>&1 || true
          echo ""
          echo "=== 结果 ==="
          find packages -name '*.deb' 2>/dev/null || echo "无deb包"

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: MomoAITweak
          path: packages/*.deb
          if-no-files-found: warn
