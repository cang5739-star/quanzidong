name: 编译马桶Ai越狱插件

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装Theos
        run: |
          # 传统方式安装Theos（这个最稳）
          sudo mkdir -p /opt/theos
          sudo chown $(whoami) /opt/theos
          git clone --recursive --depth=1 https://github.com/theos/theos.git /opt/theos

          # 复制SDK（macOS自带iOS SDK，直接链过去就行）
          # Theos会自动检测Xcode的SDK
          echo "THEOS=/opt/theos" >> $GITHUB_ENV

      - name: 编译插件
        run: |
          export THEOS=/opt/theos
          export THEOS_DEVICE_IP=localhost
          make package 2>&1

      - name: 上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: MomoAITweak
          path: packages/*.deb
          if-no-files-found: warn

      - name: 打印结果
        run: |
          echo "## ✅ 马桶Ai插件编译完成" > $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -la packages/ 2>/dev/null || echo "未生成deb包，请检查日志"
